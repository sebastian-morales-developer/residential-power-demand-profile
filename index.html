<!DOCTYPE html>
<html lang="en" data-bs-theme="light" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State Demand Profile Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container py-4 py-md-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="app-shell shadow-sm">
          <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
            <div>
              <p class="eyebrow mb-2">Demand profile explorer</p>
              <h1 class="h3 mb-1">Average kW by state and month</h1>
              <p class="text-body-secondary mb-0">Choose a state and an available month to visualize the demand profile.</p>
            </div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span class="badge rounded-pill border app-badge">Static HTML · CSS · JS</span>
              <button id="themeToggle" type="button" class="btn btn-outline-secondary theme-toggle" aria-pressed="false">
                <span id="themeToggleIcon" aria-hidden="true">🌙</span>
                <span id="themeToggleLabel">Dark mode</span>
              </button>
            </div>
          </div>

          <div class="row g-3 align-items-end mb-4">
            <div class="col-12 col-md-6">
              <label for="stateSelect" class="form-label fw-semibold">State</label>
              <select id="stateSelect" class="form-select" aria-label="Select state"></select>
            </div>
            <div class="col-12 col-md-6">
              <label for="monthSelect" class="form-label fw-semibold">Month</label>
              <select id="monthSelect" class="form-select" aria-label="Select month"></select>
            </div>
          </div>

          <div id="messageBox" class="alert d-none" role="alert"></div>

          <div id="summaryRow" class="row g-3 mb-4 d-none">
            <div class="col-12 col-md-4">
              <div class="summary-card">
                <span class="summary-label">Selected state</span>
                <strong id="summaryState">—</strong>
              </div>
            </div>
            <div class="col-12 col-md-4">
              <div class="summary-card">
                <span class="summary-label">Selected month</span>
                <strong id="summaryMonth">—</strong>
              </div>
            </div>
            <div class="col-12 col-md-4">
              <div class="summary-card">
                <span class="summary-label">Time intervals</span>
                <strong id="summaryPoints">—</strong>
              </div>
            </div>
          </div>

          <div id="chartCard" class="chart-card d-none">
            <div class="chart-wrapper">
              <canvas id="demandChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/appData.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
